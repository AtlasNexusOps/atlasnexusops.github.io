name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build CSS + OG image
        run: npm run build

      - name: HTML validation
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tidy
          tidy -q -e index.html
